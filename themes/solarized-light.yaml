---
default:
  margin:
    percent: 8
  colors:
    foreground: "586e75"
    background: "fdf6e3"

slide_title:
  alignment: center
  padding_bottom: 1
  padding_top: 1
  colors:
    foreground: "cb4b16"
  bold: true
  font_size: 2

code:
  alignment: center
  minimum_size: 50
  minimum_margin:
    percent: 8
  theme_name: Solarized (light)
  padding:
    horizontal: 2
    vertical: 1

execution_output:
  colors:
    foreground: "586e75"
    background: "eee8d5"
  status:
    running:
      foreground: "268bd2"
    success:
      foreground: "859900"
    failure:
      foreground: "dc322f"
    not_started:
      foreground: "b58900"
  padding:
    horizontal: 2
    vertical: 1

pty_output:
  colors:
    foreground: "586e75"
    background: "eee8d5"
  cursor:
    highlight_colors:
      foreground: "eee8d5"
      background: "586e75"

inline_code:
  colors:
    foreground: "dc322f"
    background: "eee8d5"

intro_slide:
  title:
    alignment: center
    colors:
      foreground: "cb4b16"
    font_size: 2
  subtitle:
    alignment: center
    colors:
      foreground: "2aa198"
  event:
    alignment: center
    colors:
      foreground: "268bd2"
  location:
    alignment: center
    colors:
      foreground: "6c71c4"
  date:
    alignment: center
    colors:
      foreground: "6c71c4"
  author:
    alignment: center
    colors:
      foreground: "93a1a1"
    positioning: page_bottom
  footer: false

headings:
  h1:
    prefix: "██"
    colors:
      foreground: "268bd2"
  h2:
    prefix: "▓▓▓"
    colors:
      foreground: "2aa198"
  h3:
    prefix: "▒▒▒▒"
    colors:
      foreground: "6c71c4"
  h4:
    prefix: "░░░░░"
    colors:
      foreground: "6c71c4"
  h5:
    prefix: "░░░░░░"
    colors:
      foreground: "b58900"
  h6:
    prefix: "░░░░░░░"
    colors:
      foreground: "b58900"

block_quote:
  prefix: "▍ "
  colors:
    foreground: "586e75"
    background: "eee8d5"
    prefix: "cb4b16"

alert:
  prefix: "▍ "
  base_colors:
    foreground: "586e75"
    background: "eee8d5"
  styles:
    note:
      color: "268bd2"
    tip:
      color: "859900"
    important:
      color: "6c71c4"
    warning:
      color: "b58900"
    caution:
      color: "dc322f"

typst:
  colors:
    foreground: "586e75"
    background: "eee8d5"

footer:
  style: template
  right: "{current_slide} / {total_slides}"

modals:
  selection_colors:
    foreground: "cb4b16"

mermaid:
  background: transparent
  theme: default

d2:
  theme: 4

layout_grid:
  color: "2aa198"

palette:
  colors:
    base03: "002b36"
    base02: "073642"
    base01: "586e75"
    base00: "657b83"
    base0: "839496"
    base1: "93a1a1"
    base2: "eee8d5"
    base3: "fdf6e3"
    yellow: "b58900"
    orange: "cb4b16"
    red: "dc322f"
    magenta: "d33682"
    violet: "6c71c4"
    blue: "268bd2"
    cyan: "2aa198"
    green: "859900"